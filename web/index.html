<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Capybara web console">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Capybara">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Capybara</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <form id="capybara-auth-form" aria-hidden="true" style="display: none;"></form>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    (() => {
      const formId = 'capybara-auth-form';
      const observedRoots = new WeakSet();

      const visitRoots = (root, visitor) => {
        if (!root) return;
        visitor(root);
        const nodes = root.querySelectorAll
          ? root.querySelectorAll('*')
          : [];
        nodes.forEach((node) => {
          if (node.shadowRoot) {
            visitRoots(node.shadowRoot, visitor);
          }
        });
      };

      const collectInputs = () => {
        const inputs = [];
        visitRoots(document, (root) => {
          if (!root.querySelectorAll) return;
          root.querySelectorAll('input').forEach((element) => {
            if (element instanceof HTMLInputElement) {
              inputs.push(element);
            }
          });
        });
        return inputs;
      };

      const assignFieldMetadata = () => {
        let emailCount = 0;
        let passwordCount = 0;
        let codeCount = 0;
        let textCount = 0;
        collectInputs().forEach((element) => {
          if (!(element instanceof HTMLInputElement)) return;
          if (element.type === 'hidden') return;

          element.setAttribute('form', formId);

          if (!element.name) {
            if (element.type === 'email') {
              emailCount += 1;
              element.name = emailCount === 1 ? 'email' : `email_${emailCount}`;
            } else if (element.type === 'password') {
              passwordCount += 1;
              element.name =
                  passwordCount === 1 ? 'password' : `password_${passwordCount}`;
            } else if (element.inputMode === 'numeric') {
              codeCount += 1;
              element.name = codeCount === 1 ? 'email_code' : `code_${codeCount}`;
            } else {
              textCount += 1;
              element.name = `field_${textCount}`;
            }
          }

          if (!element.id) {
            element.id = `capybara-${element.name}`;
          }
        });
      };

      const observeRoot = (root) => {
        if (!root || observedRoots.has(root)) return;
        observedRoots.add(root);
        new MutationObserver(() => {
          observeAllRoots();
          scheduleSync();
        }).observe(root, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['type', 'inputmode'],
        });
      };

      const observeAllRoots = () => {
        visitRoots(document, observeRoot);
      };

      const scheduleSync = () => window.requestAnimationFrame(assignFieldMetadata);

      observeAllRoots();
      window.addEventListener('load', scheduleSync);
      window.setInterval(assignFieldMetadata, 400);
      scheduleSync();
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
